# context path
server.servlet.context-path=/erppp
server.port=8081

spring.mvc.hiddenmethod.filter.enabled=true

#connection setting
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=localdb;encrypt=false
spring.datasource.username=sa
spring.datasource.password=mssql8907
spring.jpa.database=sql-server

# jpa settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# springSecurity
spring.security.user.password=securitypassword

# redis
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
